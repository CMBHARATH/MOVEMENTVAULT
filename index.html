
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMENTVAULT - Premium Task Secretary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            perspective: 1200px;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(102, 126, 234, 0.5);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            z-index: 2;
        }

        /* Left side - Clock */
        .clock-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            perspective: 1000px;
        }

        .clock-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 1s ease-out;
        }

        /* 3D Clock */
        .clock-container {
            perspective: 1000px;
            animation: rotateIn 1.2s ease-out;
        }

        .clock {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), rgba(0,0,0,0.3));
            border: 8px solid rgba(102, 126, 234, 0.8);
            position: relative;
            box-shadow: 
                0 0 60px rgba(102, 126, 234, 0.5),
                inset 0 0 60px rgba(0,0,0,0.3),
                0 20px 60px rgba(0,0,0,0.5);
            transform: rotateX(10deg) rotateY(-5deg);
            animation: clockGlow 3s ease-in-out infinite;
        }

        @keyframes clockGlow {
            0%, 100% {
                box-shadow: 
                    0 0 60px rgba(102, 126, 234, 0.5),
                    inset 0 0 60px rgba(0,0,0,0.3),
                    0 20px 60px rgba(0,0,0,0.5);
            }
            50% {
                box-shadow: 
                    0 0 80px rgba(102, 126, 234, 0.8),
                    inset 0 0 60px rgba(0,0,0,0.3),
                    0 20px 80px rgba(102, 126, 234, 0.3);
            }
        }

        .clock-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: linear-gradient(to top, rgba(102, 126, 234, 0.9), rgba(118, 75, 162, 0.9));
            border-radius: 10px;
        }

        .hour-hand {
            width: 8px;
            height: 80px;
            margin-left: -4px;
            animation: rotateHour 43200s linear infinite;
        }

        .minute-hand {
            width: 6px;
            height: 110px;
            margin-left: -3px;
            animation: rotateMinute 3600s linear infinite;
        }

        .second-hand {
            width: 3px;
            height: 120px;
            margin-left: -1.5px;
            background: #ff6b6b;
            animation: rotateSecond 60s linear infinite;
        }

        @keyframes rotateHour {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateMinute {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateSecond {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Right side - Dashboard */
        .dashboard-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow-y: auto;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(102, 126, 234, 0.2);
            animation: slideInRight 1s ease-out;
        }

        .dashboard-header {
            margin-bottom: 40px;
        }

        .dashboard-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .dashboard-subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transform: translateY(0);
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease-out;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.6);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.15);
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Add task form */
        .add-task-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            font-size: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .input-field:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.8);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Tasks list */
        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 16px;
            padding: 18px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 12px;
            align-items: flex-start;
            transition: all 0.3s ease;
            animation: slideUp 0.4s ease-out;
            transform: translateZ(0);
        }

        .task-item:hover {
            border-color: rgba(102, 126, 234, 0.6);
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px) translateZ(0);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(102, 126, 234, 0.6);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: rgba(102, 126, 234, 0.1);
        }

        .task-checkbox:hover {
            border-color: rgba(102, 126, 234, 1);
            background: rgba(102, 126, 234, 0.2);
        }

        .task-item.completed .task-checkbox {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #667eea;
            color: white;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: rgba(255,255,255,0.5);
        }

        .task-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .task-delete {
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 6px;
            color: #ff6b6b;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .task-delete:hover {
            background: rgba(255, 107, 107, 0.2);
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.5);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 15px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes rotateIn {
            from {
                opacity: 0;
                transform: rotateX(-20deg) rotateY(20deg) scale(0.8);
            }
            to {
                opacity: 1;
                transform: rotateX(10deg) rotateY(-5deg) scale(1);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Success message */
        .success-msg {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(74, 222, 128, 0.3);
            animation: slideUp 0.4s ease-out;
            z-index: 1000;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }

            .dashboard-section {
                border-left: none;
                border-top: 1px solid rgba(102, 126, 234, 0.2);
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Left Side - Clock -->
        <div class="clock-section">
            <div class="clock-title">MOMENTVAULT</div>
            <div class="clock-container">
                <div class="clock">
                    <div class="clock-face">
                        <div class="hand hour-hand"></div>
                        <div class="hand minute-hand"></div>
                        <div class="hand second-hand"></div>
                        <div class="clock-center"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Dashboard -->
        <div class="dashboard-section">
            <div class="dashboard-header">
                <div class="dashboard-title">Your Personal<br>Task Secretary</div>
                <div class="dashboard-subtitle">Never miss a deadline again</div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">📋 Total Tasks</div>
                    <div class="stat-value" id="totalTasks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">✓ Completed</div>
                    <div class="stat-value" id="completedTasks">0</div>
                </div>
            </div>

            <!-- Add Task Form -->
            <div class="add-task-section">
                <div class="section-title">
                    <i class="fas fa-plus-circle"></i> Add New Task
                </div>
                <div class="form-group">
                    <input type="text" class="input-field" id="taskInput" placeholder="What needs to be done?">
                </div>
                <div class="form-row">
                    <input type="date" class="input-field" id="taskDate">
                    <input type="time" class="input-field" id="taskTime">
                </div>
                <button class="submit-btn" id="addBtn">
                    <i class="fas fa-plus"></i> Save Task
                </button>
            </div>

            <!-- Tasks List -->
            <div class="section-title">
                <i class="fas fa-tasks"></i> Your Tasks
            </div>
            <div class="tasks-list" id="tasksList">
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <div class="empty-text">No tasks yet. Create one to get started!</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Create animated particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 20 + 20) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        // Supabase setup
        const SUPABASE_URL = 'https://bcjbsbpricgzhzhuqqig.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjamJzYnByaWNnemh6aHVxcWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTk5ODYwNzUsImV4cCI6MjAzNTU2MjA3NX0.sb_pub1$hable_DN8cAQ7hIAEui9hI28PIA_mDojCeIX';

        let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let tasks = [];

        // Set default date and time
        document.getElementById('taskDate').valueAsDate = new Date();
        const now = new Date();
        document.getElementById('taskTime').value = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

        // Event listeners
        document.getElementById('addBtn').addEventListener('click', addTask);
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Load tasks
        loadTasks();

        async function loadTasks() {
            try {
                const { data, error } = await supabase
                    .from('tasks')
                    .select('*')
                    .order('scheduled_date', { ascending: true });

                if (error) throw error;
                tasks = data || [];
                renderTasks();
                updateStats();
            } catch (error) {
                console.log('Error loading tasks:', error.message);
            }
        }

        async function addTask() {
            const title = document.getElementById('taskInput').value.trim();
            const date = document.getElementById('taskDate').value;
            const time = document.getElementById('taskTime').value;

            if (!title || !date || !time) {
                alert('Please fill in all fields!');
                return;
            }

            try {
                const { error } = await supabase.from('tasks').insert([{
                    title: title,
                    description: '',
                    scheduled_date: date,
                    reminder_time: time,
                    is_completed: false,
                    user_id: 'user_' + Date.now()
                }]);

                if (error) throw error;

                showSuccess('✓ Task added successfully!');
                document.getElementById('taskInput').value = '';
                loadTasks();
            } catch (error) {
                console.log('Error:', error.message);
                alert('Error adding task');
            }
        }

        async function toggleTask(taskId, completed) {
            try {
                const { error } = await supabase.from('tasks').update({ is_completed: !completed }).eq('id', taskId);
                if (error) throw error;
                loadTasks();
            } catch (error) {
                console.log('Error:', error.message);
            }
        }

        async function deleteTask(taskId) {
            if (confirm('Delete this task?')) {
                try {
                    const { error } = await supabase.from('tasks').delete().eq('id', taskId);
                    if (error) throw error;
                    showSuccess('✓ Task deleted!');
                    loadTasks();
                } catch (error) {
                    console.log('Error:', error.message);
                }
            }
        }

        function renderTasks() {
            const tasksList = document.getElementById('tasksList');

            if (tasks.length === 0) {
                tasksList.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">No tasks yet. Create one to get started!</div></div>';
                return;
            }

            tasksList.innerHTML = tasks.map(task => `
                <div class="task-item ${task.is_completed ? 'completed' : ''}">
                    <div class="task-checkbox" onclick="toggleTask(${task.id}, ${task.is_completed})">
                        ${task.is_completed ? '<i class="fas fa-check"></i>' : ''}
                    </div>
                    <div class="task-content">
                        <div class="task-title">${escapeHtml(task.title)}</div>
                        <div class="task-meta">
                            <span><i class="fas fa-calendar"></i> ${new Date(task.scheduled_date).toLocaleDateString()}</span>
                            <span><i class="fas fa-clock"></i> ${task.reminder_time}</span>
                        </div>
                    </div>
                    <button class="task-delete" onclick="deleteTask(${task.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('completedTasks').textContent = tasks.filter(t => t.is_completed).length;
        }

        function showSuccess(msg) {
            const msgEl = document.createElement('div');
            msgEl.className = 'success-msg';
            msgEl.textContent = msg;
            document.body.appendChild(msgEl);
            setTimeout(() => msgEl.remove(), 3000);
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
