<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOMENTVAULT - Your Personal Task Secretary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            color: #fff;
            perspective: 1200px;
            transition: background 1s ease;
        }

        /* TIME-BASED THEMES */
        body.morning {
            background: linear-gradient(135deg, #FFB347 0%, #FFA500 50%, #FF8C00 100%);
        }

        body.forenoon {
            background: linear-gradient(135deg, #87CEEB 0%, #4169E1 50%, #1E90FF 100%);
        }

        body.afternoon {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
        }

        body.evening {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8C42 50%, #664E88 100%);
        }

        body.night {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            z-index: 2;
        }

        .clock-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            perspective: 1000px;
        }

        .clock-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .clock-container {
            perspective: 1000px;
        }

        .clock {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), rgba(0,0,0,0.3));
            border: 8px solid rgba(255, 255, 255, 0.8);
            position: relative;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.5), inset 0 0 60px rgba(0,0,0,0.3);
            transform: rotateX(10deg) rotateY(-5deg);
        }

        .clock-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
        }

        .hour-hand {
            width: 8px;
            height: 80px;
            margin-left: -4px;
        }

        .minute-hand {
            width: 6px;
            height: 110px;
            margin-left: -3px;
        }

        .second-hand {
            width: 3px;
            height: 120px;
            margin-left: -1.5px;
            background: #ff6b6b;
        }

        .time-display {
            font-size: 24px;
            font-weight: 700;
            margin-top: 30px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .time-period {
            font-size: 14px;
            margin-top: 8px;
            opacity: 0.9;
            font-weight: 600;
        }

        .dashboard-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dashboard-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .dashboard-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .dashboard-subtitle {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .focus-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .focus-btn.active {
            background: #FF6B6B;
            border-color: #FF6B6B;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.12);
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
        }

        .add-task-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            font-size: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-family: inherit;
            margin-bottom: 12px;
        }

        .input-field::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .input-field:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .submit-btn {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 350px;
            overflow-y: auto;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 12px;
            align-items: flex-start;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 2px;
        }

        .task-item.completed .task-checkbox {
            background: rgba(76, 222, 128, 0.6);
            border-color: rgba(76, 222, 128, 1);
            color: white;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .task-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            opacity: 0.8;
        }

        .task-delete {
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(255, 107, 107, 0.2);
            border-radius: 6px;
            color: #FF6B6B;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 14px;
        }

        .task-delete:hover {
            background: rgba(255, 107, 107, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }

        .notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(76, 222, 128, 0.9);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }

            .dashboard-section {
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.2);
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="clock-section">
            <div class="clock-title">⏰ MOMENTVAULT</div>
            <div class="clock-container">
                <div class="clock">
                    <div class="clock-face">
                        <div class="hand hour-hand" id="hourHand"></div>
                        <div class="hand minute-hand" id="minuteHand"></div>
                        <div class="hand second-hand" id="secondHand"></div>
                        <div class="clock-center"></div>
                    </div>
                </div>
            </div>
            <div class="time-display">
                <span id="timeDisplay">00:00:00</span>
                <div class="time-period" id="timePeriod">MORNING</div>
            </div>
        </div>

        <div class="dashboard-section">
            <div class="dashboard-header">
                <div>
                    <div class="dashboard-title">Your Personal<br>Task Secretary</div>
                    <div class="dashboard-subtitle">Never miss a deadline again</div>
                </div>
                <button class="focus-btn" id="focusBtn">
                    <i class="fas fa-eye-slash"></i> Focus Mode
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">📋 Total Tasks</div>
                    <div class="stat-value" id="totalTasks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">✓ Completed</div>
                    <div class="stat-value" id="completedTasks">0</div>
                </div>
            </div>

            <div class="add-task-section">
                <div class="section-title">
                    <i class="fas fa-plus-circle"></i> Add New Task
                </div>
                <input type="text" class="input-field" id="taskInput" placeholder="What needs to be done?">
                <div class="form-row">
                    <input type="date" class="input-field" id="taskDate">
                    <input type="time" class="input-field" id="taskTime">
                </div>
                <button class="submit-btn" id="addBtn">
                    <i class="fas fa-plus"></i> Save Task
                </button>
            </div>

            <div class="section-title">
                <i class="fas fa-tasks"></i> Your Tasks
            </div>
            <div class="tasks-list" id="tasksList">
                <div class="empty-state">
                    <div style="font-size: 48px; margin-bottom: 12px;">📝</div>
                    <div>No tasks yet. Create one to get started!</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const db = window.supabase.createClient('https://bcjbsbpricgzhzhuqqig.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjamJzYnByaWNnemh6aHVxcWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTk5ODYwNzUsImV4cCI6MjAzNTU2MjA3NX0.sb_pub1$hable_DN8cAQ7hIAEui9hI28PIA_mDojCeIX');
        let tasks = [];
        let focusMode = false;

        document.getElementById('taskDate').valueAsDate = new Date();
        const now = new Date();
        document.getElementById('taskTime').value = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

        document.getElementById('addBtn').addEventListener('click', addTask);
        document.getElementById('taskInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
        document.getElementById('focusBtn').addEventListener('click', () => {
            focusMode = !focusMode;
            document.getElementById('focusBtn').classList.toggle('active');
            showMsg(focusMode ? '🎯 Focus Mode ON' : '🔔 Focus Mode OFF');
        });

        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 20 + 20) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                document.getElementById('particles').appendChild(p);
            }
        }

        function updateTheme() {
            const h = new Date().getHours();
            let theme, period;
            if (h >= 5 && h < 12) { theme = 'morning'; period = '🌅 MORNING'; }
            else if (h >= 12 && h < 15) { theme = 'forenoon'; period = '☀️ FORENOON'; }
            else if (h >= 15 && h < 18) { theme = 'afternoon'; period = '🌤️ AFTERNOON'; }
            else if (h >= 18 && h < 21) { theme = 'evening'; period = '🌅 EVENING'; }
            else { theme = 'night'; period = '🌙 NIGHT'; }
            document.body.className = theme;
            document.getElementById('timePeriod').textContent = period;
        }

        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            document.getElementById('hourHand').style.transform = `rotate(${((h % 12 + m / 60) / 12) * 360}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(${((m + s / 60) / 60) * 360}deg)`;
            document.getElementById('secondHand').style.transform = `rotate(${(s / 60) * 360}deg)`;
            document.getElementById('timeDisplay').textContent = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        async function loadTasks() {
            try {
                const { data, error } = await db.from('tasks').select('*').order('scheduled_date');
                if (error) throw error;
                tasks = data || [];
                renderTasks();
                updateStats();
            } catch (e) { console.log('Error:', e); }
        }

        async function addTask() {
            const title = document.getElementById('taskInput').value.trim();
            const date = document.getElementById('taskDate').value;
            const time = document.getElementById('taskTime').value;
            if (!title || !date || !time) { alert('Fill all fields!'); return; }
            try {
                const { error } = await db.from('tasks').insert([{ title, scheduled_date: date, reminder_time: time, is_completed: false, user_id: 'user_' + Date.now() }]);
                if (error) throw error;
                showMsg('✅ Task Added!');
                document.getElementById('taskInput').value = '';
                loadTasks();
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function toggleTask(id, completed) {
            try {
                await db.from('tasks').update({ is_completed: !completed }).eq('id', id);
                loadTasks();
                showMsg(!completed ? '✓ Done!' : 'Undone');
            } catch (e) { console.log('Error:', e); }
        }

        async function deleteTask(id) {
            if (!confirm('Delete?')) return;
            try {
                await db.from('tasks').delete().eq('id', id);
                showMsg('🗑️ Deleted');
                loadTasks();
            } catch (e) { console.log('Error:', e); }
        }

        function renderTasks() {
            const list = document.getElementById('tasksList');
            if (tasks.length === 0) {
                list.innerHTML = '<div class="empty-state"><div style="font-size: 48px; margin-bottom: 12px;">📝</div><div>No tasks yet. Create one to get started!</div></div>';
                return;
            }
            list.innerHTML = tasks.map(t => `
                <div class="task-item ${t.is_completed ? 'completed' : ''}">
                    <div class="task-checkbox" onclick="toggleTask(${t.id}, ${t.is_completed})">${t.is_completed ? '<i class="fas fa-check"></i>' : ''}</div>
                    <div class="task-content">
                        <div class="task-title">${t.title}</div>
                        <div class="task-meta">
                            <span><i class="fas fa-calendar"></i> ${new Date(t.scheduled_date).toLocaleDateString()}</span>
                            <span><i class="fas fa-clock"></i> ${t.reminder_time}</span>
                        </div>
                    </div>
                    <button class="task-delete" onclick="deleteTask(${t.id})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('completedTasks').textContent = tasks.filter(t => t.is_completed).length;
        }

        function showMsg(msg) {
            const el = document.createElement('div');
            el.className = 'notification';
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        createParticles();
        updateClock();
        updateTheme();
        setInterval(updateClock, 1000);
        setInterval(updateTheme, 60000);
        loadTasks();
    </script>
</body>
</html>
